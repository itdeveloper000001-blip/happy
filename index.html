    <link rel="stylesheet" crossorigin href="./assets/index-D5oMbRBH.css">
  </head>
  <body>
    <div id="root"></div>
    <audio id="bgMusic" loop autoplay muted>
      <source src="./DJ Snake feat. Justin Bieber - let melove you.mp3" type="audio/mpeg">
    </audio>
  </body>
  <script>
    const audio = document.getElementById('bgMusic');
            audio.volume = 0.3;

            // Размьютим после первого касания/клика
            document.body.addEventListener('touchstart', () => {
              audio.muted = false;
              audio.play().catch(e => console.log(e));
            }, { once: true });
        
            document.body.addEventListener('click', () => {
              audio.muted = false;
              audio.play().catch(e => console.log(e));
            }, { once: true });
  </script>
